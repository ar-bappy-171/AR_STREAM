<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d04"/>
      <stop offset="50%" style="stop-color:#f48c06"/>
      <stop offset="100%" style="stop-color:#ffba08"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fff3cd"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Film reel accent - left side -->
  <circle cx="140" cy="200" r="50" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.25"/>
  <circle cx="140" cy="200" r="16" fill="#ffffff" opacity="0.25"/>
  <circle cx="140" cy="152" r="10" fill="#ffffff" opacity="0.2"/>
  <circle cx="140" cy="248" r="10" fill="#ffffff" opacity="0.2"/>
  <circle cx="92" cy="200" r="10" fill="#ffffff" opacity="0.2"/>
  <circle cx="188" cy="200" r="10" fill="#ffffff" opacity="0.2"/>
  <!-- Film strip lines -->
  <rect x="90" y="290" width="100" height="8" rx="4" fill="#ffffff" opacity="0.15"/>
  <rect x="90" y="310" width="70" height="8" rx="4" fill="#ffffff" opacity="0.12"/>
  <rect x="90" y="330" width="85" height="8" rx="4" fill="#ffffff" opacity="0.1"/>
  <!-- Play button triangle - centered -->
  <polygon points="220,150 220,362 390,256" fill="url(#playGrad)" filter="url(#shadow)"/>
  <!-- AR text -->
  <text x="256" y="440" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">AR</text>
</svg>
